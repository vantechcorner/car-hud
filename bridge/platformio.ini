[platformio]
; V1: UART to ESP32-S3 HUD (low latency). Use esp32_bridge_bt3_wifi only if you cannot run a wire.
default_envs = esp32_bridge_bt3

[env:esp32_bridge_bt3]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; Slightly lower peak current than 240 MHz — helps marginal USB / AMS1117 during BT init.
board_build.f_cpu = 160000000L
; Custom app ~1.5MB: fits BT+WiFi binary and works on 2MB flash. huge_app (~3MB app) overflows 2MB boards → boot loop.
board_build.partitions = partitions_bridge.csv
; If brownout persists: use short thick USB cable, powered hub, or 470 µF on 3V3 at the ESP32.
; Last resort (masks bad power — not recommended): CONFIG_ESP32_BROWNOUT_DET=n
board_build.sdkconfig_options =
  CONFIG_ESP32_BROWNOUT_DET_LVL_SEL_0=y

build_flags =
  ; Prefer MAC for reliable connect
  -D OBD_BT_MAC=\"10:21:3E:4E:BE:77\"
  ; Or fallback by BT device name
  -D OBD_BT_NAME=\"V-LINK\"
  -D HUD_UART_BAUD=115200
  -D HUD_UART_RX_PIN=16
  -D HUD_UART_TX_PIN=17
  ; Xen kẽ 010D / 010C mỗi BRIDGE_ALTERNATE_POLL_MS (~6 Hz mỗi PID). Giảm hơn nữa có thể làm ELM lỗi.
  -D BRIDGE_ALTERNATE_POLL_MS=80
  -D BRIDGE_TEMP_MS=4000
  ; Bench: uncomment for USB debug (raw ELM line -> HUD line)
  ; -D BRIDGE_DEBUG

; Same firmware + WiFi UDP to ESP32-S3 HUD (no UART wire). Joins HUD SoftAP — độ trễ thường cao hơn UART.
[env:esp32_bridge_bt3_wifi]
extends = env:esp32_bridge_bt3
build_flags =
  ${env:esp32_bridge_bt3.build_flags}
  -D HUD_USE_WIFI
  ; Must match WIFI_AP_SSID / WIFI_AP_PASS on the S3 build
  -D WIFI_STA_SSID=\"CarHUD-Link\"
  -D WIFI_STA_PASS=\"carhud12\"
  ; Optional: fixed HUD IP on a home LAN (uncomment all 5 lines)
  ; -D HUD_UDP_USE_STATIC_TARGET
  ; -D HUD_UDP_TARGET_OCT1=192
  ; -D HUD_UDP_TARGET_OCT2=168
  ; -D HUD_UDP_TARGET_OCT3=1
  ; -D HUD_UDP_TARGET_OCT4=50

; Bench / UI test: không Bluetooth, không OBD — gửi PID giả (tốc độ + RPM + nước + ắc) giống dòng ELM.
; Chu kỳ ~40 s: tăng tua/tốc mượt → giữ cao → hạ về idle. Nạp: pio run -e esp32_bridge_sim
[env:esp32_bridge_sim]
extends = env:esp32_bridge_bt3
build_flags =
  ${env:esp32_bridge_bt3.build_flags}
  -D BRIDGE_SIMULATE
; Giả lập qua WiFi UDP (HUD bật SoftAP). pio run -e esp32_bridge_sim_wifi
[env:esp32_bridge_sim_wifi]
extends = env:esp32_bridge_sim
build_flags =
  ${env:esp32_bridge_sim.build_flags}
  -D HUD_USE_WIFI
  -D WIFI_STA_SSID=\"CarHUD-Link\"
  -D WIFI_STA_PASS=\"carhud12\"
