; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; uncomment only one
; default_envs = elecrow_c3_1_28 ; ELECROW C3 LCD 1.28 240x240
; default_envs = m5_dial ; M5 Stack Dial 240x240
; default_envs = viewe_smartring ; Viewe SmartRing 1.75 466x466 AMOLED
; default_envs = viewe_knob_1_5 ; Viewe Touch Knob 1.5 466x466 AMOLED
; default_envs = lolin_c3_mini ; ESP32-C3 LVGL 1.28 Inch 240x240
; default_envs = lolin_s3_mini_1_28 ; Waveshare ESP32-S3-Touch-LCD-1.28
default_envs = lolin_s3_mini_1_28_uart_bridge ; Waveshare S3 + NodeMCU bridge (UART, lowest latency)
; default_envs = lolin_s3_mini_1_28_wifi_bridge ; WiFi UDP bridge — higher latency; use only if no UART wire
; default_envs = lolin_s3_mini_1_69 ; Waveshare ESP32-S3-Touch-LCD-1.69

; default_envs = wt32_sc01_plus
; default_envs = 


[env]
lib_deps = 
	lvgl/lvgl@9.4.0
build_flags = 
	-D LV_CONF_SKIP
    -D LV_CONF_INCLUDE_SIMPLE
	-D LV_LVGL_H_INCLUDE_SIMPLE
	-D LV_USE_OBJ_NAME=1
	-D LV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB
	-D LV_USE_LOG=1


[esp32]
platform = espressif32@6.9.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps = 
	${env.lib_deps}
	lovyan03/LovyanGFX@1.1.16
build_flags = 
	${env.build_flags}
	

; ELECROW C3 LCD 1.28
[env:elecrow_c3_1_28]
extends = esp32
board = lolin_c3_mini
board_build.partitions = partitions/partition.csv
lib_deps = 
	${esp32.lib_deps}
	makuna/RTC@2.4.3
build_flags = 
	${esp32.build_flags}
	-D ELECROW_C3=1

; Viewe SmartRing 466x466 AMOLED 
[env:viewe_smartring]
extends = esp32
board = lolin_s3_pro
board_build.partitions = partitions/partition_16M.csv
lib_deps = 
	${esp32.lib_deps}
	moononournation/GFX Library for Arduino@1.5.7
	lewisxhe/SensorLib@0.3.1
	FastIMU=https://github.com/LiquidCGS/FastIMU/archive/refs/tags/1.2.6.zip
	fbiego/ChronosESP32@1.9.0
	fbiego/Timber@^1.1.0
build_flags = 
	${esp32.build_flags}
	-D VIEWE_SMARTRING=1
	-D LV_MEM_SIZE=144U*1024U
	-DARDUINO_USB_CDC_ON_BOOT=1

; Viewe Touch Knob 466x466 AMOLED 
[env:viewe_knob_1_5]
extends = esp32
board = lolin_s3_pro
board_build.partitions = partitions/partition_16M.csv
lib_deps = 
	${esp32.lib_deps}
	moononournation/GFX Library for Arduino@1.5.7
	lewisxhe/SensorLib@0.3.1
	paulstoffregen/Encoder@1.4.4
build_flags = 
	${esp32.build_flags}
	-D VIEWE_KNOB_15=1
	-D LV_MEM_SIZE=144U*1024U

; M5 Stack Dial
[env:m5_stack]
extends = esp32
board = m5stack-stamps3
board_build.partitions = partitions/partition_8M.csv
lib_deps = 
	${env.lib_deps}	
	m5stack/M5Dial@1.0.3
build_flags = 
	${esp32.build_flags}
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D M5_STACK_DIAL=1
	-D LV_MEM_SIZE=144U*1024U

; ESP32-C3 LVGL 1.28 Inch 240x240
[env:lolin_c3_mini]
extends = esp32
board = lolin_c3_mini
board_build.partitions = partitions/partition.csv
lib_deps = ${esp32.lib_deps}
build_flags = 
	${esp32.build_flags}
	-D ESPC3=1
	-D LV_MEM_SIZE=144U*1024U

; Waveshare ESP32-S3-Touch-LCD-1.28
[env:lolin_s3_mini_1_28]
extends = esp32
board = lolin_s3_mini
board_upload.flash_size = 16MB
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.partitions = partitions/partition_16M.csv
lib_deps = 
	${esp32.lib_deps}
	FastIMU=https://github.com/LiquidCGS/FastIMU/archive/refs/tags/1.2.6.zip
	h2zero/NimBLE-Arduino@^1.4.2
	fbiego/Timber@^1.1.0
build_flags = 
	${esp32.build_flags}
	-D ESPS3_1_28=1
	-D LV_MEM_SIZE=144U*1024U

; Waveshare ESP32-S3-Touch-LCD-1.28 + UART bridge input from ESP32 classic
[env:lolin_s3_mini_1_28_uart_bridge]
extends = env:lolin_s3_mini_1_28
build_flags =
	${env:lolin_s3_mini_1_28.build_flags}
	-D OBD_UART_BRIDGE=1
	-D OBD_BRIDGE_BAUD=115200
	-D OBD_BRIDGE_RX_PIN=16
	-D OBD_BRIDGE_TX_PIN=15

; Waveshare ESP32-S3: SoftAP + UDP from ESP32 bridge (no UART to bridge)
[env:lolin_s3_mini_1_28_wifi_bridge]
extends = env:lolin_s3_mini_1_28
build_flags =
	${env:lolin_s3_mini_1_28.build_flags}
	-D OBD_WIFI_BRIDGE=1
	-D WIFI_AP_SSID=\"CarHUD-Link\"
	-D WIFI_AP_PASS=\"carhud12\"
	-D OBD_WIFI_UDP_PORT=3333

; Waveshare ESP32-S3-Touch-LCD-1.69
[env:lolin_s3_mini_1_69]
extends = esp32
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.partitions = partitions/partition_16M.csv ; app3M_fat9M_16MB.csv
lib_deps = 
	${esp32.lib_deps}
	FastIMU=https://github.com/LiquidCGS/FastIMU/archive/refs/tags/1.2.6.zip
build_flags = 
	${esp32.build_flags}
	-D ESPS3_1_69=1
	-D LV_MEM_SIZE=144U*1024U

; Cheap Yellow Display ESP32
[env:esp32-cyd]
extends = esp32
board = esp32doit-devkit-v1
board_build.partitions = partitions/partition.csv
lib_deps = ${esp32.lib_deps}
build_flags = 
	${esp32.build_flags}
	-D LV_MEM_SIZE=60U*1024U
	-D ESP32_CYD=1

[env:esp32doit-devkit-v1]
extends = esp32
board = esp32doit-devkit-v1
board_build.partitions = partitions/partition.csv
lib_deps = ${esp32.lib_deps}
build_flags = 
	${esp32.build_flags}
	-D LV_MEM_SIZE=60U*1024U

[env:elecrow_3_5]
extends = esp32
board = esp32-s3-devkitc-1
lib_deps = 
	${esp32.lib_deps}
build_flags = 
	${esp32.build_flags}
    -D ELECROW_35=1

[env:wt32_sc01_plus]
extends = esp32
board = esp32-s3-devkitc-1
lib_deps = 
	${esp32.lib_deps}
    smartpanle/PanelLan@^0.0.1
build_flags = 
	${esp32.build_flags}
    -D WT32_SC01_PLUS=1